server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flowsync_simple?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 你的数据库密码
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 10000
      maximum-pool-size: 5

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.mybatis: DEBUG

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /doc.html

# ---- DeepSeek AI 配置 ----
# 获取 API Key: https://platform.deepseek.com/
# 在 backend\.env 中填写 DEEPSEEK_API_KEY=sk-xxx
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}

github:
  app-id: ${GITHUB_APP_ID:}
  client-id: ${GITHUB_CLIENT_ID:}
  client-secret: ${GITHUB_CLIENT_SECRET:}
  private-key: ${GITHUB_PRIVATE_KEY:}
